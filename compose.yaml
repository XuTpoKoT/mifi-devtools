services:
  postgres:
    image: postgres:16
    container_name: otp_postgres
    environment:
      POSTGRES_DB: otp_db
      POSTGRES_USER: otp_user
      POSTGRES_PASSWORD: otp_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: otp_app
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/otp_db
      SPRING_DATASOURCE_USERNAME: otp_user
      SPRING_DATASOURCE_PASSWORD: otp_pass

volumes:
  pg_data:
